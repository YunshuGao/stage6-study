<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stage 6 Self-Study Navigator</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .python-link {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    margin: 1rem 0;
    padding: 0.875rem 1.25rem;
    background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
    color: #fff;
    font-weight: 700;
    font-size: 1rem;
    border-radius: var(--radius-lg);
    transition: all var(--transition);
    box-shadow: var(--shadow);
  }
  .python-link:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); filter: brightness(1.08); }
  .python-link__icon { font-size: 1.25rem; }

  .subject-tab--all.active { border-color: var(--text); background: var(--bg); color: var(--text); }

  .reset-btn {
    padding: 0.375rem 0.75rem;
    border-radius: var(--radius);
    border: 1px solid var(--danger);
    color: var(--danger);
    font-size: 0.75rem;
    font-weight: 600;
    background: transparent;
    cursor: pointer;
    transition: all var(--transition);
  }
  .reset-btn:hover { background: var(--danger); color: #fff; }

  .dashboard-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 0.75rem;
    margin-bottom: 1rem;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem;
    text-align: center;
  }
  .stat-card__number { font-size: 1.75rem; font-weight: 800; line-height: 1; }
  .stat-card__label { font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem; }
  .stat-card--ec .stat-card__number { color: var(--ec); }
  .stat-card--swe .stat-card__number { color: var(--swe); }
</style>
</head>
<body>

<!-- Header -->
<header class="site-header">
  <div class="container site-header__inner">
    <div>
      <h1 class="site-header__title">Stage 6 Self-Study <span>Navigator</span></h1>
      <p class="site-header__subtitle">Enterprise Computing &amp; Software Engineering — NESA Stage 6</p>
    </div>
    <div class="countdown" id="countdown">
      <span>Final Prac in</span>
      <span class="countdown__number" id="countdown-days">--</span>
      <span class="countdown__label">days</span>
    </div>
  </div>
</header>

<main class="container" style="padding-top: 1rem; padding-bottom: 2rem;">

  <!-- Overall Progress -->
  <section class="progress-section">
    <div class="progress-group">
      <div class="progress-item">
        <span class="progress-item__label">Overall</span>
        <div class="progress-bar"><div class="progress-bar__fill progress-bar__fill--overall" id="prog-overall" style="width:0%"></div></div>
        <span class="progress-item__pct" id="pct-overall">0%</span>
      </div>
      <div class="progress-item">
        <span class="progress-item__label">Enterprise Computing</span>
        <div class="progress-bar"><div class="progress-bar__fill progress-bar__fill--ec" id="prog-ec" style="width:0%"></div></div>
        <span class="progress-item__pct" id="pct-ec">0%</span>
      </div>
      <div class="progress-item">
        <span class="progress-item__label">Software Engineering</span>
        <div class="progress-bar"><div class="progress-bar__fill progress-bar__fill--swe" id="prog-swe" style="width:0%"></div></div>
        <span class="progress-item__pct" id="pct-swe">0%</span>
      </div>
    </div>
  </section>

  <!-- Dashboard Stats -->
  <div class="dashboard-stats" id="dashboard-stats"></div>

  <!-- Python Practice Link -->
  <a href="python.html" class="python-link">
    <span class="python-link__icon">🐍</span>
    Python Practice Exercises
    <span style="font-weight:400; font-size:0.875rem; opacity:0.85;">→</span>
  </a>

  <!-- Filter Tabs -->
  <div class="subject-tabs" id="filter-tabs">
    <button class="subject-tab subject-tab--all active" data-filter="all">All</button>
    <button class="subject-tab subject-tab--ec" data-filter="ec">Enterprise Computing</button>
    <button class="subject-tab subject-tab--swe" data-filter="swe">Software Engineering</button>
  </div>

  <!-- Topic Cards -->
  <div id="topics-container"></div>

</main>

<!-- Footer -->
<footer class="site-footer">
  <div class="container">
    <p>Stage 6 Self-Study Navigator &mdash; Yunshu Gao &mdash; Final Prac: 11 May 2026</p>
    <button class="reset-btn" id="reset-btn" style="margin-top:0.5rem">Reset All Progress</button>
  </div>
</footer>

<script>
(function() {
  'use strict';

  // ─── State ────────────────────────────────────────────────────
  const STORAGE_KEY = 's6_study';
  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch(e) {}
    return { completed: {}, quizAnswered: {} };
  }
  function saveState(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }
  let state = loadState();

  // ─── Countdown ────────────────────────────────────────────────
  const TARGET = new Date('2026-05-11T00:00:00');
  function updateCountdown() {
    const diff = TARGET - new Date();
    const days = Math.max(0, Math.ceil(diff / 86400000));
    const el = document.getElementById('countdown-days');
    el.textContent = days;
    if (days <= 14) document.getElementById('countdown').classList.add('countdown--urgent');
  }
  updateCountdown();
  setInterval(updateCountdown, 3600000);

  // ─── Data Loading ─────────────────────────────────────────────
  const subjects = [
    { key: 'ec', label: 'Enterprise Computing', years: ['y11','y12'] },
    { key: 'swe', label: 'Software Engineering', years: ['y11','y12'] }
  ];

  const allContent = {};   // { ec_y11: [...], ec_y12: [...], ... }
  const allQuestions = {};

  async function loadData() {
    const fetches = [];
    for (const subj of subjects) {
      for (const yr of subj.years) {
        const k = `${subj.key}_${yr}`;
        fetches.push(
          fetch(`data/${k}_content.json`).then(r => r.json()).then(d => { allContent[k] = d; }),
          fetch(`data/${k}_questions.json`).then(r => r.json()).then(d => { allQuestions[k] = d; })
        );
      }
    }
    await Promise.all(fetches);
    buildDashboard();
  }

  // ─── Sanitise topic name for ID ───────────────────────────────
  function sanitise(s) {
    return s.replace(/[^a-zA-Z0-9]+/g, '_').replace(/^_|_$/g, '');
  }

  // ─── Build content-point ID ───────────────────────────────────
  function cpId(subject, year, topic, idx) {
    return `${subject}-${year}-${sanitise(topic)}_cp${idx}`;
  }

  // ─── Build Dashboard ─────────────────────────────────────────
  function buildDashboard() {
    const container = document.getElementById('topics-container');
    container.innerHTML = '';

    // Group by subject + year → topics
    const groups = [];
    for (const subj of subjects) {
      for (const yr of subj.years) {
        const k = `${subj.key}_${yr}`;
        const content = allContent[k] || [];
        const questions = allQuestions[k] || [];

        // Extract unique topics (preserve order)
        const topicMap = new Map();
        for (const c of content) {
          if (!topicMap.has(c.topic)) {
            topicMap.set(c.topic, { sections: new Set(), cpCount: 0 });
          }
          const info = topicMap.get(c.topic);
          info.sections.add(c.section);
          info.cpCount++;
        }

        // Count questions per topic
        const qCountMap = {};
        for (const q of questions) {
          qCountMap[q.topic] = (qCountMap[q.topic] || 0) + 1;
        }

        groups.push({
          subjectKey: subj.key,
          subjectLabel: subj.label,
          year: yr,
          yearLabel: yr === 'y11' ? 'Year 11' : 'Year 12',
          topics: [...topicMap.entries()].map(([name, info]) => ({
            name,
            sections: [...info.sections],
            cpCount: info.cpCount,
            qCount: qCountMap[name] || 0,
            subjectKey: subj.key,
            year: yr
          }))
        });
      }
    }

    // Render groups
    for (const g of groups) {
      const wrapper = document.createElement('div');
      wrapper.className = `topic-group`;
      wrapper.dataset.subject = g.subjectKey;

      const heading = document.createElement('h2');
      heading.className = 'year-heading';
      heading.innerHTML = `${g.subjectLabel} <span class="year-heading__badge year-heading__badge--${g.year === 'y11' ? 'y11' : 'y12'}">${g.yearLabel}</span>`;
      wrapper.appendChild(heading);

      const grid = document.createElement('div');
      grid.className = 'topics-grid stagger';

      for (const t of g.topics) {
        // Compute progress for this topic
        const k = `${t.subjectKey}_${t.year}`;
        const contentItems = (allContent[k] || []).filter(c => c.topic === t.name);
        let done = 0;
        contentItems.forEach((c, i) => {
          const id = cpId(t.subjectKey, t.year, t.name, i);
          if (state.completed[id]) done++;
        });
        const pct = t.cpCount > 0 ? Math.round(done / t.cpCount * 100) : 0;

        const card = document.createElement('a');
        card.className = `topic-card topic-card--${t.subjectKey}`;
        card.href = `topic.html?subject=${t.subjectKey}&year=${t.year}&topic=${encodeURIComponent(t.name)}`;
        card.innerHTML = `
          <div class="topic-card__title">${t.name}</div>
          <div class="topic-card__sections">${t.sections.join(' · ')}</div>
          <div class="topic-card__stats">
            <span class="topic-card__stat">📄 ${t.cpCount} points</span>
            <span class="topic-card__stat">❓ ${t.qCount} questions</span>
          </div>
          <div class="topic-card__footer">
            <div class="topic-card__progress">
              <div class="topic-card__progress-fill" style="width:${pct}%; background: var(--${t.subjectKey})"></div>
            </div>
            <span class="topic-card__pct">${pct}%</span>
          </div>
        `;
        grid.appendChild(card);
      }

      wrapper.appendChild(grid);
      container.appendChild(wrapper);
    }

    updateProgress();
    applyFilter();
  }

  // ─── Progress Bars ────────────────────────────────────────────
  function updateProgress() {
    let totalAll = 0, doneAll = 0;
    let totalEc = 0, doneEc = 0;
    let totalSwe = 0, doneSwe = 0;

    for (const subj of subjects) {
      for (const yr of subj.years) {
        const k = `${subj.key}_${yr}`;
        const content = allContent[k] || [];
        // Track per-topic index
        const topicIdx = {};
        for (const c of content) {
          if (!topicIdx[c.topic]) topicIdx[c.topic] = 0;
          const id = cpId(subj.key, yr, c.topic, topicIdx[c.topic]);
          topicIdx[c.topic]++;

          totalAll++;
          if (subj.key === 'ec') totalEc++; else totalSwe++;

          if (state.completed[id]) {
            doneAll++;
            if (subj.key === 'ec') doneEc++; else doneSwe++;
          }
        }
      }
    }

    const pctAll = totalAll > 0 ? Math.round(doneAll / totalAll * 100) : 0;
    const pctEc = totalEc > 0 ? Math.round(doneEc / totalEc * 100) : 0;
    const pctSwe = totalSwe > 0 ? Math.round(doneSwe / totalSwe * 100) : 0;

    document.getElementById('prog-overall').style.width = pctAll + '%';
    document.getElementById('pct-overall').textContent = pctAll + '%';
    document.getElementById('prog-ec').style.width = pctEc + '%';
    document.getElementById('pct-ec').textContent = pctEc + '%';
    document.getElementById('prog-swe').style.width = pctSwe + '%';
    document.getElementById('pct-swe').textContent = pctSwe + '%';

    // Stats cards
    const statsEl = document.getElementById('dashboard-stats');
    const totalQuizAnswered = Object.keys(state.quizAnswered).length;
    const quizCorrect = Object.values(state.quizAnswered).filter(v => v === 'correct').length;
    statsEl.innerHTML = `
      <div class="stat-card">
        <div class="stat-card__number">${doneAll}</div>
        <div class="stat-card__label">of ${totalAll} points completed</div>
      </div>
      <div class="stat-card stat-card--ec">
        <div class="stat-card__number">${doneEc}</div>
        <div class="stat-card__label">EC points (${totalEc} total)</div>
      </div>
      <div class="stat-card stat-card--swe">
        <div class="stat-card__number">${doneSwe}</div>
        <div class="stat-card__label">SWE points (${totalSwe} total)</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__number">${totalQuizAnswered > 0 ? Math.round(quizCorrect / totalQuizAnswered * 100) + '%' : '--'}</div>
        <div class="stat-card__label">Quiz accuracy (${totalQuizAnswered} answered)</div>
      </div>
    `;
  }

  // ─── Filter Tabs ──────────────────────────────────────────────
  let activeFilter = 'all';

  function applyFilter() {
    document.querySelectorAll('.topic-group').forEach(g => {
      if (activeFilter === 'all') {
        g.style.display = '';
      } else {
        g.style.display = g.dataset.subject === activeFilter ? '' : 'none';
      }
    });
  }

  document.getElementById('filter-tabs').addEventListener('click', e => {
    const btn = e.target.closest('.subject-tab');
    if (!btn) return;
    document.querySelectorAll('.subject-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    applyFilter();
  });

  // ─── Reset ────────────────────────────────────────────────────
  document.getElementById('reset-btn').addEventListener('click', () => {
    if (!confirm('Reset ALL progress? This cannot be undone.')) return;
    state = { completed: {}, quizAnswered: {} };
    saveState(state);
    buildDashboard();
  });

  // ─── Init ─────────────────────────────────────────────────────
  loadData();

})();
</script>
</body>
</html>
